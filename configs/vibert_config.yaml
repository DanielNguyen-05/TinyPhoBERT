# viBERT Configuration — model thứ 4 để thử ensemble
# viBERT (FPTAI): pretrain 10GB text tiếng Việt, kiến trúc giống mBERT
# nhưng loại bỏ vocab không cần thiết. Domain khác PhoBERT/ViSoBERT/Qwen
# — có thể mang thêm sai số bổ trợ cho ensemble.

model:
  name: "FPTAI/vibert-base-cased"
  num_labels: 3
  dropout: 0.1
  classifier_dropout: 0.1

preprocessing:
  enabled: true
  lowercase: true
  remove_url: true
  normalize_unicode: true
  reduce_repeat: true
  apply_teencode: true
  remove_emoji: false
  remove_phone: true

augmentation:
  enabled: false                 # Theo bài học từ ViSoBERT — thử tắt trước
  target_classes: [1, 2]
  augment_ratio: 0.5
  num_aug_per_sample: 3
  alpha_sr: 0.1
  alpha_ri: 0.1
  alpha_rs: 0.1
  p_rd: 0.1

training:
  output_dir: "checkpoints/vibert_noaug"
  num_epochs: 30
  batch_size: 32
  max_seq_length: 128
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false
  dataloader_num_workers: 4
  early_stopping_patience: 4

  use_cosine_schedule: true

  use_focal_loss: true
  focal_gamma: 2.0
  label_smoothing: 0.1
  use_weighted_sampler: true
  sampler_strength: 0.5

  use_llrd: true
  llrd_factor: 0.9

  # FGM cũng có thể thử thêm nếu muốn (đã giúp PhoBERT_v2)
  use_fgm: false

data:
  train_file: "data/processed/train.csv"
  val_file: "data/processed/val.csv"
  test_file: "data/processed/test.csv"
  augmented_dir: "data/augmented"
  text_col: "free_text"
  label_col: "label_id"
  seed: 42

logging:
  use_wandb: false
  use_tensorboard: true
  project_name: "TinyPhoBERT"
  run_name: "vibert-noaug-hsd"
  log_dir: "logs/vibert_noaug"