# DAMS-TinyPhoBERT: domain-adapted, multi-scale distilled comparison model
model:
  vocab_size: 64001
  num_hidden_layers: 6
  hidden_size: 384
  num_attention_heads: 6
  intermediate_size: 1536
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  max_position_embeddings: 258
  type_vocab_size: 1
  layer_norm_eps: 1.0e-5
  num_labels: 3
  classifier_dropout: 0.2
  teacher_hidden_size: 1024

  # Paper-inspired head: learn from upper layers, local n-grams and global context.
  classification_head: multiscale
  num_mixed_layers: 4
  cnn_kernel_sizes: [1, 3, 5]
  cnn_channels: 128

  # Cover the full depth of PhoBERT-large, including its task-specific top layer.
  layer_mapping:
    0: 3
    1: 7
    2: 11
    3: 15
    4: 19
    5: 23
