# Teacher Configuration — BẢN KHÔI PHỤC
# Đạt Macro-F1=65.38% | accuracy=87.28% | best_epoch=22
# (KHÔNG có SupCon — SupCon được thêm sau này gây NaN và giảm hiệu suất)

model:
  name: "vinai/phobert-base"    # 12L/768H/135M — nhỏ hơn large 2.6 lần
  num_labels: 3                       # CLEAN, OFFENSIVE, HATE
  dropout: 0.1
  classifier_dropout: 0.1

# ── Preprocessing (Phase 1 từ paper arXiv:2206.00524) ─────────────────────────
preprocessing:
  enabled: true
  lowercase: true
  remove_url: true
  normalize_unicode: true
  reduce_repeat: true
  apply_teencode: true
  remove_emoji: false
  remove_phone: true

# ── EDA Data Augmentation (từ paper arXiv:2502.08960 + 2206.00524) ────────────
augmentation:
  enabled: true
  target_classes: [1, 2]
  augment_ratio: 0.5
  num_aug_per_sample: 3
  alpha_sr: 0.1
  alpha_ri: 0.1
  alpha_rs: 0.1
  p_rd: 0.1

training:
  # QUAN TRỌNG: dùng thư mục RIÊNG BIỆT, KHÔNG dùng chung với bất kỳ
  # script nào khác (fusion, qwen, distillation) để tránh bị ghi đè.
  output_dir: "checkpoints/phobert_base"
  num_epochs: 30
  batch_size: 32
  max_seq_length: 128
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false                  # BẬT khi chạy GPU CUDA (--fp16)
  dataloader_num_workers: 4
  early_stopping_patience: 4

  use_cosine_schedule: true

  use_focal_loss: true
  focal_gamma: 2.0
  label_smoothing: 0.1
  use_weighted_sampler: true
  sampler_strength: 0.5

  use_llrd: true
  llrd_factor: 0.9

data:
  train_file: "data/processed/train.csv"
  val_file: "data/processed/val.csv"
  test_file: "data/processed/test.csv"
  augmented_dir: "data/augmented"
  text_col: "free_text"
  label_col: "label_id"
  seed: 42

logging:
  use_wandb: false
  use_tensorboard: true
  project_name: "TinyPhoBERT"
  run_name: "phobert-base-hsd"
  log_dir: "logs/phobert_base"