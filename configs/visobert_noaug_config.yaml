# ViSoBERT Configuration — augmentation TẮT (ablation)
# Đã xác nhận: teencode/reduce_repeat KHÔNG phải nguyên nhân ViSoBERT thấp
# hơn published (63.82% vs 67.71%). Bước tiếp theo: cô lập xem EDA
# augmentation (thiết kế cho PhoBERT vocab 64K) có phải nguyên nhân khi
# áp lên ViSoBERT (vocab chỉ 15K) không.

model:
  name: "uitnlp/visobert"       # XLM-R 12L/768H, pretrained trên social media tiếng Việt
  num_labels: 3
  dropout: 0.1
  classifier_dropout: 0.1

preprocessing:
  enabled: true
  lowercase: true
  remove_url: true
  normalize_unicode: true
  reduce_repeat: false          # Giữ tắt — bản raw không cải thiện nhưng cũng không hại
  apply_teencode: false          # Giữ tắt — ViSoBERT hiểu teencode gốc tốt hơn
  remove_emoji: false
  remove_phone: true

augmentation:
  enabled: false                 # ← TẮT hoàn toàn để cô lập biến số EDA
  target_classes: [1, 2]
  augment_ratio: 0.5
  num_aug_per_sample: 3
  alpha_sr: 0.1
  alpha_ri: 0.1
  alpha_rs: 0.1
  p_rd: 0.1

training:
  output_dir: "checkpoints/visobert_noaug"
  num_epochs: 30
  batch_size: 32
  max_seq_length: 128
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false
  dataloader_num_workers: 4
  early_stopping_patience: 4

  use_cosine_schedule: true

  use_focal_loss: true
  focal_gamma: 2.0
  label_smoothing: 0.1
  use_weighted_sampler: true
  sampler_strength: 0.5

  use_llrd: true
  llrd_factor: 0.9

data:
  train_file: "data/processed/train.csv"
  val_file: "data/processed/val.csv"
  test_file: "data/processed/test.csv"
  augmented_dir: "data/augmented"
  text_col: "free_text"
  label_col: "label_id"
  seed: 42

logging:
  use_wandb: false
  use_tensorboard: true
  project_name: "TinyPhoBERT"
  run_name: "visobert-noaug-hsd"
  log_dir: "logs/visobert_noaug"