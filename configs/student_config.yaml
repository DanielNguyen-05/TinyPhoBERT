# Student Configuration — TinyPhoBERT Architecture

model:
  # Architecture
  vocab_size: 64001                   # PhoBERT vocab size
  num_hidden_layers: 6                # 6 layers (vs 12 in PhoBERT)
  hidden_size: 384                    # 384 dim (vs 768 in PhoBERT)
  num_attention_heads: 6              # 6 heads (vs 12 in PhoBERT)
  intermediate_size: 1536             # FFN size = 4 * hidden_size
  hidden_act: "gelu"
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  max_position_embeddings: 258        # PhoBERT uses 258
  type_vocab_size: 1                  # RoBERTa-style (no token type)
  initializer_range: 0.02
  layer_norm_eps: 1.0e-5
  num_labels: 3                       # CLEAN, OFFENSIVE, HATE
  classifier_dropout: 0.1

  # Layer mapping for distillation: student_layer -> teacher_layer
  layer_mapping:
    0: 1   # Student layer 0 <- Teacher layer 1
    1: 3   # Student layer 1 <- Teacher layer 3
    2: 5   # Student layer 2 <- Teacher layer 5
    3: 7   # Student layer 3 <- Teacher layer 7
    4: 9   # Student layer 4 <- Teacher layer 9
    5: 11  # Student layer 5 <- Teacher layer 11

training:
  output_dir: "checkpoints/student"
  num_epochs: 10
  batch_size: 32
  max_seq_length: 128
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  fp16: false
  dataloader_num_workers: 4
  save_strategy: "epoch"
  metric_for_best_model: "eval_f1_macro"

data:
  train_file: "data/processed/train.csv"
  val_file: "data/processed/val.csv"
  test_file: "data/processed/test.csv"
  text_col: "free_text"
  label_col: "label_id"
  seed: 42

logging:
  use_wandb: false
  use_tensorboard: true
  project_name: "TinyPhoBERT"
  run_name: "student-tinyphobert"
  log_dir: "logs/student"
